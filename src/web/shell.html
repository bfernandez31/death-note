<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache">
  <title>death-note</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #08020a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: monospace;
      color: #d48aff;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #3a1a5a;
      border-top-color: #d48aff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .crt-wrapper {
      position: relative;
      display: inline-block;
      border: 3px solid #1a0525;
      outline: 3px solid #0d0115;
    }
    /* Scanlines */
    .crt-wrapper::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.15) 2px,
        rgba(0,0,0,0.15) 3px
      );
      mix-blend-mode: multiply;
      pointer-events: none;
      z-index: 2;
    }
    /* Vignette */
    .crt-wrapper::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse at center,
        transparent 60%,
        rgba(8,2,10,0.6) 85%,
        rgba(8,2,10,0.95) 100%
      );
      pointer-events: none;
      z-index: 3;
    }
    /* Flicker overlay */
    .crt-flicker {
      position: absolute;
      inset: 0;
      background: rgba(212,138,255,0.02);
      pointer-events: none;
      z-index: 4;
      animation: flicker 7s ease-in-out infinite;
    }
    @keyframes flicker {
      0%, 92%, 100% { opacity: 0; }
      94% { opacity: 1; }
      96% { opacity: 0.5; }
      98% { opacity: 0.8; }
    }

    #canvas {
      display: none;
      cursor: default;
      position: relative;
      z-index: 1;
    }
    #webgl-error {
      display: none;
      max-width: 480px;
      text-align: center;
      padding: 24px;
      background: #1a0525;
      border: 1px solid #ff5a8a;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <span>Loading&hellip;</span>
  </div>

  <div class="crt-wrapper" id="crt-wrapper" style="display:none;">
    <canvas id="canvas" tabindex="0" oncontextmenu="event.preventDefault()"></canvas>
    <div class="crt-flicker"></div>
  </div>

  <div id="webgl-error">
    <strong>WebGL not available</strong><br><br>
    death-note requires WebGL to run. Enable hardware acceleration in your
    browser settings or try a different browser.
  </div>

  <script>
    (function () {
      var canvas = document.getElementById('canvas');

      // Probe WebGL on a throwaway canvas — never on `#canvas`. Calling
      // getContext on `#canvas` would permanently bind it to that context,
      // preventing raylib/GLFW's emscripten path from acquiring its own
      // WebGL1 context (-sFULL_ES2=1) and breaking rlglInit silently.
      var probe = document.createElement('canvas');
      var supported = false;
      try { supported = !!(probe.getContext('webgl2') || probe.getContext('webgl')); } catch (_) {}
      if (!supported) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('webgl-error').style.display = 'block';
        return;
      }

      // Click-to-focus so keyboard input is routed to the game canvas
      canvas.addEventListener('click', function () { canvas.focus(); });

      var Module = {
        canvas: canvas,
        onRuntimeInitialized: function () {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('crt-wrapper').style.display = 'inline-block';
          canvas.style.display = 'block';
          canvas.focus();
        },
        // Suppress the default Emscripten full-screen error overlay
        printErr: function (text) { console.error(text); },
      };

      // Expose Module globally so the Emscripten glue script can find it
      window.Module = Module;
    })();
  </script>

  {{{ SCRIPT }}}
</body>
</html>
